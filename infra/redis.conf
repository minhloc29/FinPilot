# Redis Configuration

# Network
bind 0.0.0.0
port 6379

# General
daemonize no
pidfile /var/run/redis.pid
loglevel notice
databases 16

# Persistence
save 900 1
save 300 10
save 60 10000
dbfilename dump.rdb
dir /data

# Security
# requirepass your_redis_password_here

# Memory Management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Append Only File
appendonly yes
appendfilename "appendonly.aof"
